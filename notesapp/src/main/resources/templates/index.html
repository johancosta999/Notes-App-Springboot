<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Notes App</title>
</head>

<body>
<div class="container mt-5">

<h1>Notes App 📝 </h1>
<hr>
<form id="createNoteForm" action="/save" method="post" th:object="${note}" class="card p-4 shadow rounded">

    <!-- Title field -->
    <label>
        <input type="text"
               th:field="*{title}"
               class="form-control placeholder-wave"
               maxlength="100"
               placeholder="Enter title"
               required>
    </label>

    <div class="text-danger mt-1"
         th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}">
    </div>

    <br><br>

    <!-- Content field -->
    <label>
        <textarea th:field="*{content}"
                  placeholder="Enter content"
                  class="form-control placeholder-wave"
                  maxlength="500"
                  required></textarea>
    </label>

    <!-- Backend validation message for blank content -->
    <div class="text-danger mt-1"
         th:if="${#fields.hasErrors('content')}"
         th:errors="*{content}"></div>

    <br><br>

    <button type="submit" class="btn btn-dark">
        Save Note
    </button>

</form>

<hr>

<h2>All Notes</h2>

<div th:each="note : ${notes}" class="card shadow-sm p-4">

    <h3 th:text="${note.title}"></h3>

    <p th:text="${note.content}"></p>

    <a th:href="@{/delete/{id}(id=${note.id})}" class="btn btn-danger">
        Delete
    </a>

    <br>

    <a th:href="@{/update/{id}(id=${note.id})}" class="btn btn-light">
        Edit
    </a>

    <hr>

</div>
</div>

<script>
    // Frontend validation: treat whitespace-only content as empty.
    document.getElementById('createNoteForm').addEventListener('submit', function (event) {
        const title = document.querySelector('[name="title"]');
        const content = document.querySelector('[name="content"]');

        let valid = true;

        if (!title.value.trim()) {
            title.setCustomValidity('Title is required');
            valid = false;
        } else {
            title.setCustomValidity('');
        }

        if (!content.value.trim()) {
            content.setCustomValidity('Content cannot be empty');
            valid = false;
        } else {
            content.setCustomValidity('');
        }

        if (!valid) {
            event.preventDefault();
            title.reportValidity();
            content.reportValidity();
        }
    });
</script>

</body>
</html>
