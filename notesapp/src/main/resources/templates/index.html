<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Notes App</title>
</head>

<body>
<div class="container mt-5">

<h1>Notes App 📝</h1>
<hr>
<form action="/save" method="post" th:object="${note}" class="card p-4 shadow rounded">

    <input type="text"
           th:field="*{title}"
           placeholder="Enter title"
           class="form-control"
           required>

    <br><br>

    <textarea th:field="*{content}"
              placeholder="Enter content" class="form-control"></textarea>

    <br><br>

    <button type="submit" class="btn btn-dark">
        Save Note
    </button>

</form>

<hr>

<h2>All Notes</h2>

<div th:each="note : ${notes}" class="card shadow-sm p-4">

    <h3 th:text="${note.title}"></h3>

    <p th:text="${note.content}"></p>

    <a th:href="@{/delete/{id}(id=${note.id})}" class="btn btn-danger">
        Delete
    </a>

    <br>

    <a th:href="@{/update/{id}(id=${note.id})}" class="btn btn-light">
        Edit
    </a>

    <hr>

</div>
</div>>

</body>
</html>
