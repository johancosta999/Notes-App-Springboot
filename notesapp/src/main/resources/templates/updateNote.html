<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Update Note</title>
</head>
<body>
<div class="container mt-5">
    <h1>Notes App 📝</h1>
    <hr>

    <form id="updateNoteForm" th:action="@{/update/{id}(id=${note.id})}"
          method="post"
          th:object="${note}" class="card p-4 shadow rounded ">

    <!-- Title field -->
    <label>
        <input type="text"
               th:field="*{title}"
               class="form-control"
               maxlength="100"
               required>
    </label>

    <!-- Backend validation message for title -->
    <div class="text-danger mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

    <br><br>

    <!-- Content field -->
    <label>
        <textarea th:field="*{content}"
                  class="form-control"
                  maxlength="500"
                  required></textarea>
    </label>

    <!-- Backend validation message for blank content -->
    <div class="text-danger mt-1" th:if="${#fields.hasErrors('content')}" th:errors="*{content}"></div>


    <br><br>

        <button type="submit" class="btn btn-light">
            Save Note
        </button>

    </form>
</div>

        <script>
            // Frontend validation: treat whitespace-only content as empty.
            document.getElementById('updateNoteForm').addEventListener('submit', function (event) {
                const title = document.querySelector('[name="title"]');
                const content = document.querySelector('[name="content"]');

                let valid = true;

                if (!title.value.trim()) {
                    title.setCustomValidity('Title is required');
                    valid = false;
                } else {
                    title.setCustomValidity('');
                }

                if (!content.value.trim()) {
                    content.setCustomValidity('Content cannot be empty');
                    valid = false;
                } else {
                    content.setCustomValidity('');
                }

                if (!valid) {
                    event.preventDefault();
                    title.reportValidity();
                    content.reportValidity();
                }
            });
        </script>
</body>
</html>
